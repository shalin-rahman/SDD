name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  EMCAP_CONFIG_PATH: ${{ github.workspace }}/config/platform.yaml
  EMCAP_MODULES_PATH: ${{ github.workspace }}/modules

jobs:
  # Fast unit gate: lint + in-memory SQLite tests (unchanged from Phase 0).
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Black
        run: black --check src tests

      - name: MyPy
        run: mypy src

      - name: Pytest (unit + coverage)
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest -q --cov=src --cov-report=term-missing --cov-fail-under=80

  # P4-T04: integration stage — pytest against real PostgreSQL (service container).
  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emcap
          POSTGRES_PASSWORD: emcap
          POSTGRES_DB: emcap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emcap -d emcap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply PostgreSQL migrations
        env:
          DATABASE_URL: "postgresql+psycopg://emcap:emcap@localhost:5432/emcap"
        run: python scripts/migrate.py up

      - name: Pytest (integration)
        env:
          DATABASE_URL: "postgresql+psycopg://emcap:emcap@localhost:5432/emcap"
        run: pytest -q -m integration

  # P4-T05: dependency scan — fail the job on known high/critical CVEs in installed packages.
  security-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pip-audit (dependency scan)
        run: |
          pip install pip-audit
          pip-audit --desc --severity critical --severity high

  # P4-T05: SAST — Bandit (high severity) plus Ruff security rules (flake8-bandit / S).
  security-sast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Bandit (high severity only)
        run: |
          pip install bandit
          bandit -r src -q --severity-level high

      - name: Ruff security rules (S / bandit equivalents)
        # S105 ignored: documented dev seed defaults (admin user, OAuth client).
        run: ruff check --select S --ignore S105 src

  # Angular CLI web client: build + Karma contract tests.
  client-lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - uses: browser-actions/setup-chrome@v1

      - name: Angular format, lint, build and tests
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run build
          npm run test:ci
          npm run test:coverage
          # Optional a11y-only gate (also covered by test:ci *.a11y.spec.ts):
          # npm run test:a11y

      - name: i18n bundle parity audit (P27)
        working-directory: ${{ github.workspace }}
        run: node scripts/audit-i18n.mjs

  # P18-T14 — optional Playwright smoke on PRs (non-blocking; full gate: e2e-smoke.yml weekly).
  e2e-smoke-optional:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    env:
      EMCAP_CONFIG_PATH: ${{ github.workspace }}/config/platform.yaml
      EMCAP_MODULES_PATH: ${{ github.workspace }}/modules
      DATABASE_URL: sqlite:///./.e2e-pr-smoke.db
      EMCAP_WEB_URL: http://127.0.0.1:4200
      EMCAP_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json

      - name: Install API
        working-directory: platform/api
        run: pip install -e ".[dev]"

      - name: Start API and wait for health
        working-directory: platform/api
        run: |
          uvicorn emcap.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf "$EMCAP_API_URL/api/v1/health" && exit 0
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Start web dev server
        working-directory: clients/web
        run: |
          npm ci
          npx ng serve --host 127.0.0.1 --port 4200 &
          for i in $(seq 1 60); do
            curl -sf "$EMCAP_WEB_URL" && exit 0
            sleep 2
          done
          echo "Web failed to start"
          exit 1

      - name: Playwright smoke (optional — does not block merge)
        run: |
          npx --yes playwright@1.49.1 install chromium
          node scripts/e2e-smoke.mjs

  client-lint-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter format, analyze and contract tests
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze --no-fatal-infos
          flutter test --coverage
          python ../../scripts/check-flutter-coverage.py --lcov coverage/lcov.info --min 80
