platform:
  multi_tenant: false
  white_label: false

tenant_strategy:
  mode: shared_database

modules:
  workflow:
    enabled: true
  payments:
    enabled: false
  notifications:
    enabled: true
  ai:
    enabled: false

authentication:
  username_password: true
  ldap: false
  oauth: true
  sso: false

audit:
  enabled: true
  immutable: true

notifications:
  email: true
  sms: false
  push: true
  whatsapp: false

grid:
  export_excel: true
  export_pdf: true
  export_csv: true
  grouping: true
  realtime: true
  offline: true

workflow:
  enabled: true
  escalation: true
  delegation: true
  sla_tracking: true

rules:
  scripting_enabled: false
  formula_enabled: true

payments:
  enabled: false
  provider: stripe
  stripe:
    publishable_key: ""

ai:
  enabled: false

integrations:
  rest:
    base_url: ""
  kafka:
    bootstrap: ""
    topic_prefix: ""
  soap:
    endpoint: ""

tenants:
  default:
    domain: localhost
    theme: default
  acme:
    domain: acme.local
    theme: acme-blue

# JSON seed packs under data/seed/ (see data/seed/README.md).
# Set seed.demo.enabled: false to skip demo inserts; remove_when_disabled purges demo IDs.
seed:
  core:
    enabled: true
    path: data/seed/core
  demo:
    enabled: true
    path: data/seed/demo
    remove_when_disabled: true

documents:
  storage_backend: filesystem
  max_upload_size_mb: 25
  virus_scan_enabled: true
  retention_days: 365

security:
  abac_policies:
    - permission: customer.read
      effect: allow
      attribute: tenant_id
      operator: equals
      value: "$user.tenant_id"
    - permission: customer.write
      effect: allow
      attribute: tenant_id
      operator: equals
      value: "$user.tenant_id"
