# Test profile — same as platform.yaml but demo seed disabled for isolated pytest DBs.
platform:
  multi_tenant: false
  white_label: false

tenant_strategy:
  mode: shared_database

modules:
  workflow:
    enabled: true
  payments:
    enabled: false
  notifications:
    enabled: true
  ai:
    enabled: false

authentication:
  username_password: true
  ldap: false
  oauth: true
  sso: false

audit:
  enabled: true
  immutable: true

notifications:
  email: true
  sms: false
  push: true
  whatsapp: false

grid:
  export_excel: true
  export_pdf: true
  export_csv: true
  grouping: true
  realtime: true
  offline: true

workflow:
  enabled: true
  escalation: true
  delegation: true
  sla_tracking: true

rules:
  scripting_enabled: false
  formula_enabled: true

payments:
  enabled: false

ai:
  enabled: false

tenants:
  default:
    domain: localhost
    theme: default
  acme:
    domain: acme.local
    theme: acme-blue

organization_profile:
  display_name: EMCAP Demo Corp
  legal_name: EMCAP Demo Corporation Ltd
  tax_id: ""
  email: contact@example.com
  phone: ""
  website: https://example.com
  address:
    line1: 100 Main Street
    line2: ""
    city: Demo City
    state: ""
    postal_code: "00000"
    country: US
  timezone: UTC
  locale: en
  currency: USD
  fiscal_year_start_month: 1
  logo_url: ""
  favicon_url: ""
  secondary_color: ""
  invoice:
    header: "{{display_name}}\n{{address_line1}}"
    footer: Thank you for your business.
  report:
    header: "{{display_name}} — Confidential"
    footer: Generated {{date}}
  purchase_order:
    header: "{{display_name}} — Purchase Order"
    footer: ""
  email_signature: |
    {{display_name}}
    {{email}} | {{phone}}

seed:
  core:
    enabled: true
    path: data/seed/core
  demo:
    enabled: false
    path: data/seed/demo
    remove_when_disabled: true
