---
# Install kubectl/Helm prerequisites and configure kubeconfig for the target EKS cluster.
# Stub install tasks are Linux-oriented; customize for your runner OS or pre-install tools in CI.

- name: Bootstrap EMCAP deploy prerequisites
  hosts: localhost
  gather_facts: true
  vars:
    helm_install_dir: "{{ lookup('env', 'HOME') }}/.local/bin"
  tasks:
    - name: Check kubectl
      ansible.builtin.command:
        cmd: kubectl version --client --output=yaml
      register: kubectl_check
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Install kubectl (Linux stub)
      when:
        - kubectl_check.rc != 0
        - ansible_system == "Linux"
      block:
        - name: Ensure local bin directory exists
          ansible.builtin.file:
            path: "{{ helm_install_dir }}"
            state: directory
            mode: "0755"

        - name: Download kubectl binary
          ansible.builtin.get_url:
            url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
            dest: "{{ helm_install_dir }}/kubectl"
            mode: "0755"

        - name: Re-check kubectl after install
          ansible.builtin.command:
            cmd: "{{ helm_install_dir }}/kubectl version --client --output=yaml"
          changed_when: false
          register: kubectl_recheck

        - name: Record kubectl availability after install
          ansible.builtin.set_fact:
            kubectl_check: "{{ kubectl_recheck }}"

    - name: Fail when kubectl is still missing
      ansible.builtin.fail:
        msg: >-
          kubectl not found. Install manually or set kubectl_install_command for your OS.
          See infra/ansible/README.md
      when: kubectl_check.rc != 0 and ansible_system != "Linux"

    - name: Check Helm
      ansible.builtin.command:
        cmd: helm version --short
      register: helm_check
      changed_when: false
      failed_when: false

    - name: Install Helm (Linux stub)
      when:
        - helm_check.rc != 0
        - ansible_system == "Linux"
      block:
        - name: Ensure local bin directory exists
          ansible.builtin.file:
            path: "{{ helm_install_dir }}"
            state: directory
            mode: "0755"

        - name: Download Helm archive
          ansible.builtin.get_url:
            url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
            dest: /tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz
            mode: "0644"

        - name: Extract Helm binary
          ansible.builtin.unarchive:
            src: /tmp/helm-v{{ helm_version }}-linux-amd64.tar.gz
            dest: /tmp
            remote_src: true
            creates: /tmp/linux-amd64/helm

        - name: Install Helm binary
          ansible.builtin.copy:
            src: /tmp/linux-amd64/helm
            dest: "{{ helm_install_dir }}/helm"
            mode: "0755"
            remote_src: true

    - name: Configure kubeconfig context (EKS stub)
      ansible.builtin.command:
        cmd: >-
          aws eks update-kubeconfig
          --name {{ eks_cluster_name }}
          --region {{ aws_region }}
          --kubeconfig {{ kubeconfig_path }}
      changed_when: true
      when: configure_kubeconfig | default(true) | bool

    - name: Verify cluster access
      ansible.builtin.command:
        cmd: kubectl cluster-info
      changed_when: false
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
