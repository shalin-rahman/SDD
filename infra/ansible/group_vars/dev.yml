---
emcap_env: dev
emcap_namespace: emcap-dev

aws_region: us-east-1
eks_cluster_name: emcap-dev

emcap_image_repository: "<registry>/emcap/api"

# Placeholders only — override via Ansible Vault, CI secrets, or -e @secrets.yml.
