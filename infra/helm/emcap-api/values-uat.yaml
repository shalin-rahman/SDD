# UAT cluster overrides.

replicaCount: 2

image:
  tag: uat

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: api-uat.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: emcap-api-uat-tls
      hosts:
        - api-uat.example.com

config:
  platformYaml: |
    platform:
      multi_tenant: true
      white_label: false

    tenant_strategy:
      mode: shared_database

    modules:
      workflow:
        enabled: true
      payments:
        enabled: false
      notifications:
        enabled: true
      ai:
        enabled: false

    authentication:
      username_password: true
      ldap: false
      oauth: true
      sso: false

    audit:
      enabled: true
      immutable: true

    notifications:
      email: true
      sms: false
      push: true
      whatsapp: false

    grid:
      export_excel: true
      export_pdf: true
      export_csv: true
      grouping: true
      realtime: true
      offline: true

    workflow:
      enabled: true
      escalation: true
      delegation: true
      sla_tracking: true

    rules:
      scripting_enabled: false
      formula_enabled: true

    payments:
      enabled: false

    ai:
      enabled: false

    tenants:
      default:
        domain: api-uat.example.com
        theme: default

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

worker:
  enabled: false
