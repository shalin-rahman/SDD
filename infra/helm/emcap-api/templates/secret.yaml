{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "emcap-api.fullname" . }}-secrets
  labels:
    {{- include "emcap-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required when secrets.create is true" .Values.secrets.databaseUrl | quote }}
  EMCAP_JWT_SECRET: {{ required "secrets.jwtSecret is required when secrets.create is true" .Values.secrets.jwtSecret | quote }}
  EMCAP_OAUTH_CLIENT_ID: {{ .Values.secrets.oauthClientId | quote }}
  EMCAP_OAUTH_CLIENT_SECRET: {{ .Values.secrets.oauthClientSecret | quote }}
{{- end }}
