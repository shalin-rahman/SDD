# Append to PostgreSQL (SDD §29 PITR). Mount as conf.d snippet or merge into postgresql.conf.
#
# Local docker-compose: see infra/backup/README.md override example.

wal_level = replica
archive_mode = on
# In container, bind-mount scripts and set absolute path:
# archive_command = '/scripts/wal-archive.sh %p %f'
archive_command = '/usr/local/bin/wal-archive.sh %p %f'

max_wal_senders = 3
wal_keep_size = 512MB

# Checkpoint frequency affects RPO; default is usually sufficient for <15m RPO with archiving.
checkpoint_timeout = 5min
