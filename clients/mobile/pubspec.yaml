name: emcap_mobile
description: EMCAP Flutter metadata client scaffold
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  intl: any
  file_picker: ^8.1.7
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/en.json
    - assets/i18n/fr.json
    - assets/i18n/bn.json
    - assets/i18n/en-US.json
    - assets/i18n/fr-FR.json
    - assets/i18n/bn-BD.json
