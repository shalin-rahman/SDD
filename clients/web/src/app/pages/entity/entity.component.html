<div class="entity-page">
  <app-page-header
    [title]="title"
    [showBack]="mobileDetailOpen"
    (back)="closeMobileDetail()"
  >
    <button type="button" class="entity-page__new" mat-flat-button color="primary" (click)="startCreate()">
      {{ i18n.t('entity.new') }}
    </button>
  </app-page-header>

  @if (loadError) {
    <app-empty-state
      [message]="loadError"
      [actionLabel]="i18n.t('common.retry')"
      (action)="loadEntity()"
    />
  }

  @if (loadingEntity) {
    <app-loading-panel [message]="i18n.t('common.loading')" />
  }

  @if (gridRenderer) {
    <app-master-detail-layout [detailOpen]="mobileDetailOpen">
      <div listPane class="entity-page__list">
        <app-dynamic-data-grid
          [gridRenderer]="gridRenderer"
          [columnFields]="columnFields"
          [displayGroups]="displayGroups"
          [groupBy]="groupBy"
          [filters]="filters"
          [selectedRecordId]="selectedRecordId"
          [searchInput]="searchInput"
          [pageLabel]="pageLabel"
          [page]="page"
          [totalPages]="totalPages"
          [statusLine]="statusLine"
          [exportCsv]="exportCsv"
          [exportExcel]="exportExcel"
          [exportPdf]="exportPdf"
          (searchInputChange)="onSearchInputChange($event)"
          (prevPage)="prevPage()"
          (nextPage)="nextPage()"
          (toggleGroup)="toggleGroup()"
          (sort)="onSort($event)"
          (filterChange)="onFilterChange($event.field, $event.value)"
          (recordSelect)="selectRecord($event)"
          (exportCsvClick)="exportCsvFile()"
          (exportExcelClick)="exportExcelFile()"
          (exportPdfClick)="exportPdfFile()"
          (createRecord)="startCreate()"
        />
      </div>

      <div detailPane class="entity-page__detail">
        @if (selectedRecordId || creatingNew) {
          <div class="record-detail">
            <app-record-detail-header
              [headline]="recordHeadline()"
              [subtitle]="recordSubtitle()"
              [statusLabel]="statusChipLabel()"
              [statusActive]="statusChipActive()"
              [creatingNew]="creatingNew"
              [canDelete]="canDeleteRecord()"
              [canWorkflow]="canStartWorkflow()"
              [canSave]="canSaveRecord()"
              [canRestore]="canRestoreRecord()"
              [deleteLabel]="i18n.t('entity.delete')"
              [restoreLabel]="i18n.t('entity.restore')"
              [workflowLabel]="i18n.t('entity.startWorkflow')"
              [cancelLabel]="i18n.t('entity.cancel')"
              [saveLabel]="editingId || creatingNew ? i18n.t('entity.save') : i18n.t('entity.createRecord')"
              (delete)="deleteRecord()"
              (workflow)="startWorkflow()"
              (cancel)="cancelEdit()"
              (save)="submitForm()"
              (restore)="restoreRecord()"
            />

            @if (workflowStarted) {
              <p class="record-detail__notice">{{ i18n.t('entity.workflowStarted') }}</p>
            }
            @if (detailError) {
              <p class="error">{{ detailError }}</p>
            }

            @if (formRenderer) {
              <app-dynamic-form-view
                [formRenderer]="formRenderer"
                [visibleFields]="visibleFields"
                [formValues]="formValues"
                [formError]="formError"
                [noteInput]="noteInput"
                [showNoteField]="creatingNew"
                [notePlaceholder]="i18n.t('entity.noteOptional')"
                [hideSubmitButton]="true"
                [showSystemSection]="showSystemFields()"
                (fieldChange)="onFormFieldChange($event.name, $event.value)"
                (noteInputChange)="noteInput = $event"
              />
            }

            @if (selectedRecordId && !creatingNew) {
              <app-record-tabs
                [notes]="notes"
                [documents]="documents"
                [auditEntries]="auditEntries"
                [uploadFilename]="uploadFilename"
                [uploadContent]="uploadContent"
                (previewDocument)="previewDocument($event)"
                (uploadDocument)="uploadDocument()"
                (uploadFilenameChange)="uploadFilename = $event"
                (uploadContentChange)="uploadContent = $event"
              />
            }
          </div>
        } @else {
          <app-detail-placeholder (createRecord)="startCreate()" />
        }
      </div>
    </app-master-detail-layout>
  }

  <app-document-preview-panel
    [open]="previewingDocument !== null"
    [document]="previewingDocument"
    (closed)="closeDocumentPreview()"
  />
</div>
