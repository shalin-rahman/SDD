<div class="lookup-field">
  <div class="lookup-field__value" [class.lookup-field__value--empty]="displayLabel === '—'">
    @if (loadingLabel) {
      Loading…
    } @else {
      {{ displayLabel }}
    }
  </div>
  <div class="lookup-field__actions">
    <button mat-stroked-button type="button" [disabled]="disabled" (click)="openPicker()">
      Choose {{ field.lookup_entity }}
    </button>
    @if (value) {
      <button mat-button type="button" [disabled]="disabled" (click)="clear()">Clear</button>
    }
  </div>
</div>
