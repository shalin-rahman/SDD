<a class="app-layout__skip-link" href="#main-content">{{ i18n.t('a11y.skipToContent') }}</a>
<mat-sidenav-container class="app-layout">
  <mat-sidenav
    #drawer
    class="app-layout__sidenav"
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="sidenavOpened"
    [attr.aria-label]="i18n.t('a11y.landmark.navigation')"
  >
    <div class="app-layout__brand">
      <strong>EMCAP</strong>
      <p class="app-layout__tenant-line">{{ tenantLine }}</p>
    </div>
    <app-sidenav-nav
      [platformLinks]="platformLinks"
      [navGroups]="navGroups"
      [navLoadError]="navLoadError"
      [navEmpty]="navEmpty"
      (navClick)="onNavClick()"
      (retryNav)="navRetry.emit()"
    />
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-layout__toolbar">
      @if (isMobile) {
        <button mat-icon-button type="button" [attr.aria-label]="i18n.t('toolbar.menu')" (click)="drawer.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="app-layout__title">{{ pageTitle }}</span>
      <span class="app-layout__spacer"></span>
      <mat-select
        class="app-layout__locale"
        [value]="i18n.locale()"
        (valueChange)="onLocaleChange($event)"
        [attr.aria-label]="i18n.t('toolbar.locale')"
      >
        <mat-option value="en-US">{{ i18n.t('toolbar.language.en-US') }}</mat-option>
        <mat-option value="fr-FR">{{ i18n.t('toolbar.language.fr-FR') }}</mat-option>
        <mat-option value="bn-BD">{{ i18n.t('toolbar.language.bn-BD') }}</mat-option>
      </mat-select>
      <button mat-icon-button type="button" [attr.aria-label]="i18n.t('toolbar.theme')" (click)="theme.toggle()">
        <mat-icon>{{ theme.mode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      @if (multiTenant) {
        <app-tenant-select
          [tenants]="tenants"
          [selectedTenant]="selectedTenant"
          (tenantChange)="tenantChange.emit($event)"
        />
      }
      <button mat-button type="button" (click)="signOut.emit()">{{ i18n.t('nav.signOut') }}</button>
    </mat-toolbar>
    <main id="main-content" class="app-layout__content" [attr.aria-label]="i18n.t('a11y.landmark.main')">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
