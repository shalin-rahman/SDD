<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMCAP Web Client</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; }
      .app-header { display: flex; justify-content: space-between; align-items: center; }
      .app-nav { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
      .nav-link { padding: 0.5rem 1rem; cursor: pointer; }
      table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
      th, td { border: 1px solid #ccc; padding: 0.4rem; text-align: left; }
      form.record-form, form.login-form { display: grid; gap: 0.5rem; max-width: 28rem; }
      .error { color: #b00020; }
    </style>
    <script>
      window.EMCAP_API_URL = "http://localhost:8000";
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
